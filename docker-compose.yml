services:
  # PostgreSQL with PostGIS
  db:
    image: postgis/postgis:15-3.3
    container_name: solidarity-map-db
    environment:
      POSTGRES_DB: ${DB_NAME:-solidarity_map}
      POSTGRES_USER: ${DB_USER:-solidarity_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-solidarity_pass}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/src/main/resources/data.sql:/docker-entrypoint-initdb.d/02-data.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-solidarity_user} -d ${DB_NAME:-solidarity_map}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - solidarity-network

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: solidarity-map-backend
    environment:
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-solidarity_map}
      DB_USERNAME: ${DB_USER:-solidarity_user}
      DB_PASSWORD: ${DB_PASSWORD:-solidarity_pass}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - solidarity-network
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: solidarity-map-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - solidarity-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  solidarity-network:
    driver: bridge
