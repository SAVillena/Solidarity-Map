spring.application.name=solidarity-map-backend

# Database Configuration (PostgreSQL)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# CORS Configuration
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.create-schemas=false

# SQL Initialization (disabled in prod - Docker handles it)
# En desarrollo local, esto ejecutará data.sql
# En producción (Docker), schema.sql se ejecuta primero por docker-entrypoint-initdb.d
spring.sql.init.mode=never
spring.sql.init.continue-on-error=false

# Upload Limits (for Excel)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging Configuration
# Nivel de log general
logging.level.root=INFO

# Logs detallados para nuestra aplicación
logging.level.com.solidaritymap=DEBUG

# Logs de SQL (ya está habilitado con spring.jpa.show-sql=true)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Logs de Spring Web para debugging de requests
logging.level.org.springframework.web=DEBUG

# Patrón de logging con emojis para mejor visibilidad
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Actuator endpoints (for Docker health checks)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.db.enabled=true
